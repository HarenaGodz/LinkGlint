name: macOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build app for runner architecture
        run: ARCHS="$(uname -m)" ./build_app.sh

      - name: Verify bundle
        run: |
          codesign --verify --deep --strict --verbose=2 dist/NetBar.app
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' dist/NetBar.app/Contents/Info.plist)" = "3.1.0"
